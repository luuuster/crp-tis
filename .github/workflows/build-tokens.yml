name: tokens

# Valida em PRs e pushes; publica em GitHub Packages na main (via changesets).
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write      # bump de versão + push do changelog
  packages: write      # publicar em GitHub Packages
  pull-requests: write # changesets abre a PR "Version Packages"

concurrency:
  group: tokens-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://npm.pkg.github.com
          cache: npm
          cache-dependency-path: package-lock.json

      # O lock é gerado com npm 11 (packageManager declarado); o Node 22 traz npm 10, que não
      # entende o campo `libc` do lock → `npm ci` daria ERESOLVE. Alinha o npm com o lock.
      - name: npm 11 (igual ao packageManager + lock)
        run: npm install -g npm@11.11.0

      - run: npm ci

      - name: Build dos tokens
        run: npm run build          # primitives + themes/* + tokens.css + theme.css

      - name: Validar (refs, contrato, contraste WCAG)
        run: npm run check

      - name: Auditoria do dark mode (fail-loud)
        run: npm run audit:dark -- --strict

      - name: Exportar figma-variables.json (artefato gerado, não versionado)
        run: npm run export:figma

      - name: Publicar figma-variables.json (artifact)
        uses: actions/upload-artifact@v7
        with:
          name: figma-variables
          path: figma-plugin/figma-variables.json
          if-no-files-found: error

      - name: Exportar token-studio/tokens.json (bundle p/ Load from JSON, gerado e não versionado)
        run: npm run export:ts

      - name: Publicar token-studio/tokens.json (artifact)
        uses: actions/upload-artifact@v7
        with:
          name: token-studio
          path: token-studio/tokens.json
          if-no-files-found: error

      - name: Gerar e embutir bundles de ícones (Lucide + Material)
        run: npm run icons   # export (lucide-static + @material-symbols) + embed -> *.json e code.bundled.js (testes leem os .json)

      - name: Testes (plugins Figma + bundles Lucide/Material)
        run: npm test          # pure.test + bundle.test (lucide) + material.test + embed.test + run.test (lógica)

      # Só na main: abre a PR "Version Packages" ou publica quando há changesets pendentes.
      - name: Release (changesets)
        if: github.ref == 'refs/heads/main'
        uses: changesets/action@v1
        with:
          version: npx changeset version
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # App de demonstração: typecheck + build + testes (Vitest). Roda em paralelo ao job de tokens.
  app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json

      - name: npm 11 (igual ao packageManager + lock)
        run: npm install -g npm@11.11.0

      # O app consome @crp/design-tokens via file:.. → instala e gera o dist na RAIZ primeiro.
      - name: Tokens (dist consumido pelo app)
        run: npm ci && npm run build

      - name: App — instalar, lint (bugs + a11y), build (tsc + vite) e testar (inclui axe)
        working-directory: app
        run: |
          npm ci
          npm run lint
          npm run build
          npm test

  # E2E: a dimensão que o jsdom NÃO vê — no render real, 4 temas × telas: axe ESTRUTURAL +
  # CONTRASTE por pixel (culori) + FOCO visível ≥3:1. Em paralelo aos demais jobs.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json

      - name: npm 11 (igual ao packageManager + lock)
        run: npm install -g npm@11.11.0

      - name: Tokens (dist consumido pelo app)
        run: npm ci && npm run build

      - name: App — instalar e build (vite preview serve o dist no e2e)
        working-directory: app
        run: npm ci && npm run build

      - name: Instalar Chromium do Playwright (+ libs do SO)
        working-directory: app
        run: npx playwright install --with-deps chromium

      - name: E2E — axe REAL (contraste renderizado) + screenshots
        working-directory: app
        run: npm run e2e

      - name: Publicar screenshots da vitrine (artifact do PR)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: vitrine-screenshots
          path: app/e2e/__screenshots__/
          if-no-files-found: warn

      - name: Publicar relatório Playwright (em falha, p/ depurar)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: app/playwright-report/
          if-no-files-found: ignore
