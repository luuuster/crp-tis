name: tokens

# Valida em PRs e pushes; publica em GitHub Packages na main (via changesets).
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: write      # bump de versão + push do changelog
  packages: write      # publicar em GitHub Packages
  pull-requests: write # changesets abre a PR "Version Packages"

concurrency:
  group: tokens-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://npm.pkg.github.com
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci

      - name: Build dos tokens
        run: npm run build          # primitives + themes/* + tokens.css + theme.css

      - name: Validar (refs, contrato, contraste WCAG)
        run: npm run check

      - name: Auditoria do dark mode (fail-loud)
        run: npm run audit:dark -- --strict

      - name: Exportar figma-variables.json (artefato gerado, não versionado)
        run: npm run export:figma

      - name: Publicar figma-variables.json (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: figma-variables
          path: figma-plugin/figma-variables.json
          if-no-files-found: error

      - name: Gerar e embutir bundles de ícones (Lucide + Material)
        run: npm run icons   # export (lucide-static + @material-symbols) + embed -> *.json e code.bundled.js (testes leem os .json)

      - name: Testes (plugins Figma + bundles Lucide/Material)
        run: npm test          # pure.test + bundle.test (lucide) + material.test + embed.test + run.test (lógica)

      # Só na main: abre a PR "Version Packages" ou publica quando há changesets pendentes.
      - name: Release (changesets)
        if: github.ref == 'refs/heads/main'
        uses: changesets/action@v1
        with:
          version: npx changeset version
          publish: npm run release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # App de demonstração: typecheck + build + testes (Vitest). Roda em paralelo ao job de tokens.
  app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            app/package-lock.json

      # O app consome @crp/design-tokens via file:.. → instala e gera o dist na RAIZ primeiro.
      - name: Tokens (dist consumido pelo app)
        run: npm ci && npm run build

      - name: App — instalar, build (tsc + vite) e testar
        working-directory: app
        run: |
          npm ci
          npm run build
          npm test
