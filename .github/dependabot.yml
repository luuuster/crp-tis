# Dependabot: PRs automáticos para CVEs e atualizações de dependências.
# Histórico: havia um override de expr-eval-fork (CVE) preso à migração do style-dictionary.
# Migrado para style-dictionary 5 + @tokens-studio/sd-transforms 2.x → override removido
# (o sd-transforms 2 já resolve expr-eval-fork@3.0.3 seguro; npm audit = 0).
version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      build-toolchain:
        patterns: ["style-dictionary", "@tokens-studio/*", "tailwindcss", "@tailwindcss/*"]

  - package-ecosystem: npm
    directory: "/app"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      react:
        patterns: ["react", "react-dom", "@types/react*"]
      radix:
        patterns: ["radix-ui", "@radix-ui/*"]
      # Famílias acopladas por PEER DEPENDENCY: precisam subir JUNTAS senão o PR
      # quebra o `npm ci` (ex.: @eslint/js sem eslint+typescript-eslint; vite sem @vitejs/plugin-react).
      eslint:
        patterns: ["eslint", "@eslint/*", "typescript-eslint", "eslint-plugin-*", "globals"]
      vite:
        patterns: ["vite", "@vitejs/*", "vitest", "@vitest/*"]
      testing:
        patterns: ["@testing-library/*", "@playwright/*", "playwright*", "@axe-core/*", "jsdom"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: monthly
    groups:
      actions:
        patterns: ["*"]
